<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quiz da Iara - Jogo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(120deg, #001f3f, #0074D9);
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 { font-size: 32px; }

button {
  width: 220px;
  padding: 12px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #00d4ff;
  color: black;
}

#pontuacao {
  font-size: 22px;
  margin: 10px;
  transition: 0.3s;
}

#animacao {
  font-size: 28px;
  height: 40px;
}

.barra {
  width: 100%;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
  margin: 15px 0;
}

.progresso {
  height: 10px;
  width: 0%;
  background: #00ffcc;
  transition: 0.5s;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
}
</style>
</head>

<body>
<div class="container">

<h1>🌊 Quiz da Iara 🌊</h1>

<div id="inicio">
  <input id="nome" placeholder="Seu nome"><br><br>
  <button onclick="iniciar()">Começar</button>
</div>

<div id="jogo" style="display:none">
  <div id="pontuacao">Pontuação: 0</div>
  <div id="animacao"></div>

  <div class="barra">
    <div id="barra" class="progresso"></div>
  </div>

  <div id="quiz" class="card"></div>
</div>

<div id="fim"></div>

</div>

<script>

const perguntas = [
  {pergunta:"O que causou a transformação da Iara?", op:["Magia","Castigo do pai","Deus"], correta:1},
  {pergunta:"Por que os irmãos tinham inveja?", op:["Beleza","Habilidade","Riqueza"], correta:1},
  {pergunta:"Quem salvou Iara?", op:["Peixes","Pajé","Deus"], correta:0},
  {pergunta:"Onde ela vive?", op:["Amazônia","Sul","Cidade"], correta:0},
  {pergunta:"O que o canto faz?", op:["Mata","Encanta","Nada"], correta:1},
  {pergunta:"Como ela atrai homens?", op:["Força","Canto","Luz"], correta:1},
  {pergunta:"Como ficam os que voltam?", op:["Normais","Loucos","Fortes"], correta:1}
];

let atual = 0;
let pontos = 0;

function iniciar(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("jogo").style.display="block";
  mostrar();
}

function mostrar(){
  let q = perguntas[atual];

  let div = document.getElementById("quiz");
  div.innerHTML = `<h3>${q.pergunta}</h3>`;

  q.op.forEach((op,i)=>{
    div.innerHTML += `<button onclick="responder(${i})">${op}</button><br>`;
  });

  atualizarBarra();
}

function responder(i){
  let correta = perguntas[atual].correta;
  let anim = document.getElementById("animacao");

  if(i === correta){
    pontos += 10;
    anim.innerHTML = "✅ +10";
    anim.style.color = "#00ff88";
  } else {
    pontos -= 5;
    anim.innerHTML = "❌ -5";
    anim.style.color = "#ff4d4d";
  }

  document.getElementById("pontuacao").innerText = "Pontuação: " + pontos;

  atual++;

  setTimeout(()=>{
    anim.innerHTML="";
    if(atual < perguntas.length){
      mostrar();
    } else {
      finalizar();
    }
  }, 800);
}

function atualizarBarra(){
  let progresso = (atual / perguntas.length) * 100;
  document.getElementById("barra").style.width = progresso + "%";
}

function finalizar(){
  document.getElementById("jogo").style.display="none";

  let nivel = pontos < 20 ? "Iniciante"
            : pontos < 50 ? "Intermediário"
            : "Mestre";

  document.getElementById("fim").innerHTML = `
    <h2>🏆 Fim de Jogo</h2>
    <h3>Pontuação: ${pontos}</h3>
    <h3>Nível: ${nivel}</h3>
    <button onclick="location.reload()">Jogar novamente</button>
  `;
}

</script>
</body>
</html>
